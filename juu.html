<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For JUUUUUU</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    color: white;

    background: linear-gradient(-45deg, #ff9ecb, #ffc0cb, #ffffff, #ff6fa5);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 30px;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.6s ease;
}

.active {
    opacity: 1;
    transform: translateY(0);
}

.text {
    font-size: 26px;
    line-height: 1.8;
    max-width: 750px;
    color: #ff2e88;
    text-shadow: 0 0 15px rgba(255,105,180,0.8);
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 25px;
    background: linear-gradient(45deg, #ff4d6d, #ff9ecb);
    color: white;
    border: none;
    cursor: pointer;
    margin: 10px;
}

#progressBar {
    position: fixed;
    top: 0;
    left: 0;
    height: 4px;
    width: 0%;
    background: linear-gradient(90deg, pink, hotpink);
}

/* sparkles */
.sparkle {
    position: fixed;
    font-size: 12px;
    animation: floatUp 4s linear infinite;
}
@keyframes floatUp {
    0% { transform: translateY(0); opacity: 0.8; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* NO button */
#noBtn {
    position: absolute;
    transition: all 0.3s ease;
}

/* MAGIC */
#magicOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,105,180,0.4), transparent);
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
}

#magicText {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 80px;
    color: #ff2e88;
    text-shadow: 0 0 40px pink;
    opacity: 0;
    transition: all 1s ease;
    pointer-events: none;
}
</style>
</head>

<body onclick="nextSlide()">

<div id="progressBar"></div>

<div id="magicOverlay"></div>
<div id="magicText">JUUUUUU</div>

<!-- Welcome -->
<div class="slide active">
    <div>
        <div class="text" style="font-size:36px;">Welcome backk jaannn</div>
        <button onclick="event.stopPropagation(); nextSlide()">Let's go next</button>
    </div>
</div>

<!-- Slides -->
<div class="slide"><div class="text"></div></div>
<div class="slide"><div class="text"></div></div>
<div class="slide"><div class="text"></div></div>
<div class="slide"><div class="text"></div></div>

<!-- Final -->
<div class="slide">
    <div style="position:relative; width:100%; height:100%;">
        <div class="text">Tell me… how much do you love me?</div>
        <button onclick="event.stopPropagation(); answerLove(4)">Infinite</button>

        <button id="noBtn"
        onmouseover="moveNoButton()"
        onclick="moveNoButton()">
        Not at all
        </button>

        <div id="response"></div>
    </div>
</div>

<script>
let current = 0;
const slides = document.querySelectorAll(".slide");

const messages = [
"We spent 5 beautiful years together...",
"Even when we lost our way, my heart never stopped choosing you...",
"And this time... it's you, JUUUUUU... always",

`Mojii jaann I really missed you in those 2 months.
I don't even know how I spent those days without my baby girl.
I was incomplete without you.

Every night I remembered you.
I even cried sometimes.
But I never lost hope.

I prayed just for us.
Every single day I missed you.

And today... because of you...
we are back again.

Thank you.
I love you.

And be ready for more surprises after marriage.`
];

// typing
function typeText(el, text) {
    el.innerHTML = "";
    let i = 0;
    function typing() {
        if (i < text.length) {
            el.innerHTML += text[i];
            i++;
            setTimeout(typing, 30);
        }
    }
    typing();
}

// sparkles
setInterval(()=>{
    let s=document.createElement("div");
    s.className="sparkle";
    s.innerText="*";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),4000);
},400);

// progress
function updateProgress(){
    let p=((current+1)/slides.length)*100;
    document.getElementById("progressBar").style.width=p+"%";
}

// slide
function nextSlide(){
    if(current < slides.length-1){
        slides[current].classList.remove("active");
        current++;
        slides[current].classList.add("active");

        if(messages[current-1]){
            typeText(slides[current].querySelector(".text"), messages[current-1]);
        }

        updateProgress();
    }
}

// No button
let scale = 1;
function moveNoButton(){
    const btn=document.getElementById("noBtn");

    btn.style.left=Math.random()*(window.innerWidth-120)+"px";
    btn.style.top=Math.random()*(window.innerHeight-60)+"px";

    scale -= 0.1;
    if(scale < 0.5) scale = 0.5;

    btn.style.transform = "scale("+scale+")";
}

// answers
function answerLove(type){
    let msg = "";

    if(type === 1) msg = "That’s not enough";
    else if(type === 2) msg = "I know it's more";
    else if(type === 3) msg = "I still win";
    else if(type === 4){
        msg = "Haha, I love you too!";

        const overlay = document.getElementById("magicOverlay");
        const text = document.getElementById("magicText");

        overlay.style.opacity = "1";
        text.style.opacity = "1";
        text.style.transform = "translate(-50%, -50%) scale(1)";
    }

    document.getElementById("response").innerText = msg;
}

// start
updateProgress();
</script>

</body>
</html>
